<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grade Calculator // DEDSEC</title>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #08080c;
        --surface: #101014;
        --accent: #00f3ff;
        --pink: #ff0055;
        --text: #e0e0e0;
        --dim: #949498;
        --border: #1f1f23;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "IBM Plex Mono", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        padding: 30px;
        width: 100%;
        max-width: 400px;
        box-shadow: 10px 10px 0 var(--border);
      }
      .header {
        font-size: 0.7rem;
        color: var(--dim);
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
      }
      h1 {
        font-size: 1.4rem;
        margin-bottom: 25px;
        text-transform: uppercase;
        color: #fff;
      }
      label {
        display: block;
        font-size: 0.7rem;
        color: var(--accent);
        margin-bottom: 8px;
        text-transform: uppercase;
      }
      input {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        padding: 12px;
        color: #fff;
        font-family: inherit;
        margin-bottom: 5px;
      }
      /* Hide spin buttons */
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      input[type="number"] {
        -moz-appearance: textfield;
      }
      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 10px var(--accent);
      }
      input:invalid {
        border-color: var(--pink);
      }
      .stability-bar {
        height: 4px;
        background: var(--bg);
        margin-bottom: 15px;
        border: 1px solid var(--border);
        overflow: hidden;
      }
      .stability-fill {
        height: 100%;
        width: 0%;
        transition:
          width 0.3s ease,
          background-color 0.3s ease;
      }
      .stability-fill.stable {
        background: var(--accent);
        box-shadow: 0 0 5px var(--accent);
      }
      .stability-fill.warn {
        background: #f1c40f;
        box-shadow: 0 0 5px #f1c40f;
      }
      .stability-fill.crit {
        background: var(--pink);
        box-shadow: 0 0 5px var(--pink);
      }
      .error {
        color: var(--pink);
        font-size: 0.65rem;
        margin-bottom: 15px;
        height: 1em;
        transition: all 0.3s ease;
      }
      .btn {
        width: 100%;
        background: transparent;
        border: 1px solid var(--pink);
        color: var(--pink);
        padding: 12px;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
        transition: all 0.3s ease;
      }
      .btn:hover {
        background: var(--pink);
        color: #fff;
        box-shadow: 0 0 10px var(--pink);
      }
      .btn:active {
        transform: scale(0.98);
      }
      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }
      .btn:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      .shortcuts {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        font-size: 0.6rem;
        color: var(--dim);
        text-transform: uppercase;
        pointer-events: none;
      }
      .result {
        margin-top: 25px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
      }
      #res {
        font-size: 2rem;
        font-weight: bold;
        color: var(--accent);
        text-shadow: 0 0 10px var(--accent);
        transition: all 0.3s ease;
      }
      #res.fail,
      .status-fail {
        color: var(--pink) !important;
        text-shadow: 0 0 10px var(--pink) !important;
      }
      .status-good {
        color: var(--accent) !important;
        text-shadow: 0 0 10px var(--accent) !important;
      }
      .status-ok {
        color: #f1c40f !important;
        text-shadow: 0 0 10px #f1c40f !important;
      }
      .status-msg {
        font-size: 0.6rem;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 8px;
        letter-spacing: 1px;
        min-height: 1em;
      }
      .status-link {
        background: transparent;
        border: none;
        color: inherit;
        font-family: inherit;
        font-size: inherit;
        font-weight: inherit;
        text-transform: inherit;
        letter-spacing: inherit;
        padding: 0;
        cursor: pointer;
        text-decoration: underline;
        display: inline;
      }
      .res-label {
        font-size: 0.75rem;
        color: var(--dim);
        margin-bottom: 5px;
      }
      .res-wrap {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .copy-btn {
        background: transparent;
        border: 1px solid var(--accent);
        color: var(--accent);
        font-size: 0.7rem;
        padding: 4px 8px;
        cursor: pointer;
        font-family: inherit;
        text-transform: uppercase;
        transition: all 0.3s ease;
        min-width: 80px;
      }
      .copy-btn:hover {
        background: var(--accent);
        color: var(--bg);
        box-shadow: 0 0 10px var(--accent);
      }
      .copy-btn:active {
        transform: scale(0.95);
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="header" aria-hidden="true">
        <span>[ ID: GHOST_PROCESS ]</span><span>v1.0.4</span>
      </div>
      <h1>Grade Calculator</h1>
      <div class="input-group">
        <label for="score">Score (0-100)</label>
        <input
          type="number"
          id="score"
          min="0"
          max="100"
          inputmode="decimal"
          placeholder="e.g. 85"
          aria-describedby="err"
          aria-invalid="false"
          autofocus
          required
        />
        <div class="stability-bar" aria-hidden="true">
          <div id="stability-fill" class="stability-fill"></div>
        </div>
        <p id="err" class="error" role="alert"></p>
      </div>
      <button class="btn" id="btn">Calculate</button>
      <div class="shortcuts">
        <span>[ENTER] TO CALC</span>
        <span>[C] TO COPY</span>
        <span>[ESC] TO RESET</span>
      </div>
      <div class="result" aria-live="polite" aria-atomic="true">
        <p class="res-label">Result // Grade:</p>
        <p id="status" class="status-msg"></p>
        <div class="res-wrap">
          <div id="res">--</div>
          <button
            id="copy-btn"
            class="copy-btn hidden"
            aria-label="Copy grade to clipboard"
          >
            [COPY]
          </button>
        </div>
      </div>
    </main>
    <script>
      const scoreInput = document.getElementById("score");
      const err = document.getElementById("err");
      const res = document.getElementById("res");
      const status = document.getElementById("status");
      const btn = document.getElementById("btn");
      const copyBtn = document.getElementById("copy-btn");
      const stabilityFill = document.getElementById("stability-fill");

      const triggerShake = (el) => {
        if (el && el.animate) {
          el.animate(
            [
              { transform: "translateX(0)" },
              { transform: "translateX(-5px)" },
              { transform: "translateX(5px)" },
              { transform: "translateX(-5px)" },
              { transform: "translateX(5px)" },
              { transform: "translateX(0)" },
            ],
            { duration: 400, easing: "linear" },
          );
        }
      };

      const calculateGrade = (n) => {
        if (n === null || n === "") return "--";
        const s = parseFloat(n);
        if (isNaN(s) || s < 0 || s > 100) return "INVALID";
        if (s >= 90) return "A+";
        if (s >= 80) return "A";
        if (s >= 70) return "B";
        if (s >= 60) return "C";
        if (s >= 50) return "D";
        return "F";
      };

      const validate = () => {
        const val = scoreInput.value;
        const oldGrade = res.textContent;
        const wasInvalid = scoreInput.getAttribute("aria-invalid") === "true";
        // Reset classes
        res.classList.remove("fail", "status-good", "status-ok", "status-fail");
        status.classList.remove(
          "status-good",
          "status-ok",
          "status-fail",
          "status-dim",
        );
        stabilityFill.classList.remove("stable", "warn", "crit");

        if (val !== "" && (val < 0 || val > 100)) {
          err.textContent = "SYSTEM_ERROR: Range 0-100 only";
          scoreInput.setAttribute("aria-invalid", "true");
          if (!wasInvalid) triggerShake(scoreInput);
          btn.disabled = true;
          btn.setAttribute("title", "Input must be between 0 and 100");
          res.textContent = "--";
          res.setAttribute("aria-label", "Grade: None");
          status.textContent = "";
          copyBtn.classList.add("hidden");
          stabilityFill.style.width = "0%";
        } else {
          err.textContent = "";
          scoreInput.setAttribute("aria-invalid", "false");
          btn.disabled = false;
          btn.removeAttribute("title");

          const grade = calculateGrade(val);
          res.textContent = grade;

          // Update Stability Bar
          stabilityFill.style.width = (val === "" ? "0" : val) + "%";

          // Accessibility: human-readable aria-label
          const gradeLabel = grade.replace("+", " plus");
          res.setAttribute(
            "aria-label",
            `Grade: ${gradeLabel === "--" ? "None" : gradeLabel}`,
          );

          if (grade !== oldGrade && grade !== "--" && res.animate) {
            res.animate(
              [{ transform: "scale(1.1)" }, { transform: "scale(1)" }],
              {
                duration: 200,
                easing: "ease-out",
              },
            );
          }

          let statusText = "";
          let statusClass = "";

          if (grade === "A+") {
            statusText = "EXCELLENT // DISTINCTION";
            statusClass = "status-good";
          } else if (grade === "A" || grade === "B") {
            statusText = "GOOD // ABOVE_AVERAGE";
            statusClass = "status-good";
          } else if (grade === "C" || grade === "D") {
            statusText = "SATISFACTORY // PASS";
            statusClass = "status-ok";
          } else if (grade === "F") {
            statusText = "FAIL // SYSTEM_REBOOT_REQUIRED";
            statusClass = "status-fail";
          }

          // Next Goal logic
          const s = parseFloat(val);
          let nextGoalBtn = null;
          if (!isNaN(s)) {
            if (s >= 90) {
              statusText += " [ MAX_LEVEL ]";
            } else {
              const thresholds = [
                { limit: 50, label: "D" },
                { limit: 60, label: "C" },
                { limit: 70, label: "B" },
                { limit: 80, label: "A" },
                { limit: 90, label: "A+" },
              ];
              const next = thresholds.find((t) => s < t.limit);
              if (next) {
                const diff = (next.limit - s).toFixed(s % 1 === 0 ? 0 : 1);
                nextGoalBtn = document.createElement("button");
                nextGoalBtn.className = "status-link";
                nextGoalBtn.textContent = `[ +${parseFloat(diff)} TO ${next.label} ]`;
                nextGoalBtn.setAttribute(
                  "aria-label",
                  `Set score to ${next.limit} to reach grade ${next.label.replace("+", " plus")}`,
                );
                nextGoalBtn.onclick = () => {
                  scoreInput.value = next.limit;
                  validate();
                  scoreInput.focus();
                };
              }
            }
          }

          if (statusClass || statusText || nextGoalBtn) {
            status.textContent = statusText;
            if (nextGoalBtn) {
              status.appendChild(document.createTextNode(" "));
              status.appendChild(nextGoalBtn);
            }
            if (statusClass) {
              status.classList.add(statusClass);
              res.classList.add(statusClass);
            }

            // Stability bar color
            if (statusClass === "status-good") {
              stabilityFill.classList.add("stable");
            } else if (statusClass === "status-ok") {
              stabilityFill.classList.add("warn");
            } else if (statusClass === "status-fail") {
              stabilityFill.classList.add("crit");
            }
          } else {
            status.textContent = "";
          }

          if (["A+", "A", "B", "C", "D", "F"].includes(grade)) {
            copyBtn.classList.remove("hidden");
            copyBtn.setAttribute("aria-hidden", "false");
          } else {
            copyBtn.classList.add("hidden");
            copyBtn.setAttribute("aria-hidden", "true");
          }
        }
      };

      scoreInput.addEventListener("input", validate);
      scoreInput.addEventListener("focus", function () {
        this.select();
      });
      scoreInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          if (scoreInput.getAttribute("aria-invalid") === "true") {
            triggerShake(scoreInput);
          } else {
            btn.click();
          }
        }
      });

      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          scoreInput.value = "";
          validate();
          scoreInput.focus();
        }
        if (
          e.key.toLowerCase() === "c" &&
          document.activeElement !== scoreInput &&
          !e.ctrlKey &&
          !e.metaKey &&
          !e.altKey
        ) {
          copyBtn.click();
        }
      });

      btn.addEventListener("click", validate);

      copyBtn.addEventListener("click", () => {
        if (res.textContent === "--") return;
        navigator.clipboard.writeText(res.textContent).then(() => {
          const originalText = copyBtn.textContent;
          const originalAria = copyBtn.getAttribute("aria-label");
          copyBtn.textContent = "[COPIED]";
          copyBtn.setAttribute("aria-label", "Copied to clipboard");

          if (res.animate) {
            res.animate(
              [
                { transform: "scale(1)", textShadow: "0 0 10px var(--accent)" },
                {
                  transform: "scale(1.2)",
                  textShadow: "0 0 20px var(--accent)",
                },
                { transform: "scale(1)", textShadow: "0 0 10px var(--accent)" },
              ],
              { duration: 300, easing: "ease-out" },
            );
          }

          setTimeout(() => {
            copyBtn.textContent = originalText;
            if (originalAria) {
              copyBtn.setAttribute("aria-label", originalAria);
            } else {
              copyBtn.removeAttribute("aria-label");
            }
          }, 1500);
        });
      });

      // For testing
      window.calculateGrade = calculateGrade;

      // Initialize
      validate();
    </script>
  </body>
</html>
