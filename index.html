<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grade Point Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <h1>Grade Point Calculator</h1>
        <p>Calculate your GPA with ease and precision.</p>
      </div>
    </header>

    <main class="container">
      <section id="calculator" aria-labelledby="calc-heading">
        <h2 id="calc-heading">Your Courses</h2>
        <form id="gpa-form">
          <div id="course-list" role="list">
            <div class="course-row" role="listitem">
              <div class="field">
                <label for="course-0-name">Course Name</label>
                <input
                  type="text"
                  id="course-0-name"
                  name="course-name"
                  placeholder="e.g. Mathematics"
                />
              </div>
              <div class="field">
                <label for="course-0-grade">Grade</label>
                <select id="course-0-grade" name="grade">
                  <option value="4.0">A</option>
                  <option value="3.7">A-</option>
                  <option value="3.3">B+</option>
                  <option value="3.0">B</option>
                  <option value="2.7">B-</option>
                  <option value="2.3">C+</option>
                  <option value="2.0">C</option>
                  <option value="1.7">C-</option>
                  <option value="1.3">D+</option>
                  <option value="1.0">D</option>
                  <option value="0.0">F</option>
                </select>
              </div>
              <div class="field">
                <label for="course-0-credits">Credits</label>
                <input
                  type="number"
                  id="course-0-credits"
                  name="credits"
                  min="0"
                  step="0.5"
                  value="3"
                />
              </div>
              <button
                type="button"
                class="remove-course"
                aria-label="Remove Mathematics course"
                disabled
              >
                &times;
              </button>
            </div>
          </div>

          <div class="controls">
            <button type="button" id="add-course" aria-label="Add a new course">
              + Add Course
            </button>
            <button type="button" id="reset-form" aria-label="Reset all fields">
              Reset
            </button>
          </div>
        </form>
      </section>

      <section id="results" aria-live="polite">
        <div class="results-container">
          <div class="gpa-card">
            <h3>Current GPA</h3>
            <p id="gpa-display" class="gpa-value">0.00</p>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="container">
        <p>
          &copy; 2026 Grade Point Calculator. Built with accessibility in mind.
        </p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
